version: '3.8'

services:
  # Redis for realtime pub/sub and job queues
  redis:
    image: redis:7-alpine
    container_name: jiffylaundry-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - jiffylaundry-network

  # PostgreSQL Database (if running locally)
  # postgres:
  #   image: postgres:15-alpine
  #   container_name: jiffylaundry-postgres
  #   environment:
  #     POSTGRES_USER: postgres
  #     POSTGRES_PASSWORD: postgres
  #     POSTGRES_DB: jiffylaundry
  #   ports:
  #     - "5432:5432"
  #   volumes:
  #     - postgres-data:/var/lib/postgresql/data
  #   networks:
  #     - jiffylaundry-network

  # Backend API Server
  backend-api:
    build:
      context: .
      dockerfile: apps/backend-api/Dockerfile
    container_name: jiffylaundry-backend-api
    ports:
      - "4000:4000"
    environment:
      PORT: 4000
      NODE_ENV: development
      LOG_LEVEL: debug
      REDIS_URL: redis://redis:6379
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
      SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      FRONTEND_URL: http://localhost:3001,http://localhost:3002,http://localhost:3003
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./apps/backend-api/src:/app/src
    networks:
      - jiffylaundry-network
    restart: unless-stopped

volumes:
  redis-data:
  # postgres-data:

networks:
  jiffylaundry-network:
    driver: bridge
